name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-paris:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_PARIS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ vars.PROD_PARIS_PORT }}" -H "${{ vars.PROD_PARIS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to Paris
        env:
          DEPLOY_PATH: ${{ vars.PROD_PARIS_PATH }}
          DEPLOY_USER: ${{ vars.PROD_PARIS_USER }}
          DEPLOY_HOST: ${{ vars.PROD_PARIS_HOST }}
          DEPLOY_PORT: ${{ vars.PROD_PARIS_PORT }}
        run: |
          # Keep server-managed environment files out of the sync target.
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.env.development' \
            --exclude='.env.production' \
            --exclude='.env.staging' \
            --exclude='.env.local' \
            --exclude='.env.development.local' \
            --exclude='.env.test.local' \
            --exclude='.env.production.local' \
            -e "ssh -i ~/.ssh/id_rsa -p ${DEPLOY_PORT}" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
          ssh -i ~/.ssh/id_rsa -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_PATH='${DEPLOY_PATH}' bash -seuo pipefail -s" <<'EOF'
          cd "${DEPLOY_PATH}"
          npm ci
          npm run build
          pm2 startOrRestart ecosystem.config.js --env production --update-env
          pm2 save
          EOF

  deploy-china:
    runs-on: ubuntu-latest
    needs: deploy-paris
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_CHINA_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ vars.PROD_CHINA_PORT }}" -H "${{ vars.PROD_CHINA_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to China
        env:
          DEPLOY_PATH: ${{ vars.PROD_CHINA_PATH }}
          DEPLOY_USER: ${{ vars.PROD_CHINA_USER }}
          DEPLOY_HOST: ${{ vars.PROD_CHINA_HOST }}
          DEPLOY_PORT: ${{ vars.PROD_CHINA_PORT }}
        run: |
          # Keep server-managed environment files out of the sync target.
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.env.development' \
            --exclude='.env.production' \
            --exclude='.env.staging' \
            --exclude='.env.local' \
            --exclude='.env.development.local' \
            --exclude='.env.test.local' \
            --exclude='.env.production.local' \
            -e "ssh -i ~/.ssh/id_rsa -p ${DEPLOY_PORT}" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
          ssh -i ~/.ssh/id_rsa -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_PATH='${DEPLOY_PATH}' bash -seuo pipefail -s" <<'EOF'
          cd "${DEPLOY_PATH}"
          npm ci
          npm run build
          pm2 startOrRestart ecosystem.config.js --env production --update-env
          pm2 save
          EOF
